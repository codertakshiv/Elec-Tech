<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElecTech Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 10%, #17345f 0%, #050915 55%);
        color: #d9f4ff;
        font-family: 'Segoe UI', sans-serif;
      }
      .card {
        width: min(90vw, 420px);
        border: 1px solid rgba(0, 229, 255, 0.25);
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        color: #b5d4e0;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>ElecTech is offline</h1>
      <p>
        Internet connection is unavailable right now. Reopen the app when you are online or use
        previously cached pages.
      </p>
    </main>
  </body>
</html>
